version: '3.8'

services:
  database:
    image: mysql:8.0
    container_name: mysql_cv
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: cv_db
      MYSQL_USER: cv_user
      MYSQL_PASSWORD: cv_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - cv_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    image: guarcia-backend:v1
    container_name: backend_cv
    restart: always
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      DB_HOST: database
      DB_DATABASE: cv_db
      DB_USER: cv_user
      DB_PASSWORD: cv_password
      DB_DIALECT: mysql
      DB_USE_SSL: "false"
      PORT: 4000
    depends_on:
      database:
        condition: service_healthy
    networks:
      - cv_network

  frontend:
    image: guarcia-frontend:v1
    container_name: frontend_cv
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - cv_network

volumes:
  mysql_data:

networks:
  cv_network:
    driver: bridge
